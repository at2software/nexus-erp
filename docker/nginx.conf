user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 64M;

    # Required for WebSocket proxying — sets Connection: upgrade for WS, close for plain HTTP
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Detect preferred language from Accept-Language header
    map $http_accept_language $preferred_lang {
        default  en;
        ~*^de    de;
    }

    # ── Frontend (Angular) + API proxy ──────────────────────────────────────
    server {
        listen 3200;

        root /var/www/frontend;
        index index.html;

        # Root → redirect to preferred language
        location = / {
            return 302 /$preferred_lang/;
        }

        # Redirect bare /en and /de to trailing-slash versions
        location = /en { return 301 /en/; }
        location = /de { return 301 /de/; }

        # Serve English Angular app
        location /en/ {
            try_files $uri /en/index.html;
        }

        # Serve German Angular app
        location /de/ {
            try_files $uri /de/index.html;
        }

        # Proxy WebSocket connections to Reverb (default /app path, no rewrite needed)
        location /app {
            proxy_pass http://127.0.0.1:6001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_read_timeout 86400s;
        }

        # Proxy /backend/* → Laravel, stripping the /backend prefix
        location /backend {
            rewrite ^/backend/?(.*)$ /$1 break;
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── Backend-only port (direct API / admin access) ────────────────────────
    server {
        listen 8000;

        root /var/www/backend/public;
        index index.php;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass  127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }
}
