@let _user = user();

@if (!_user.public_key) {
  <rsa-settings-empty [user]="_user"></rsa-settings-empty>
}

<div class="header d-flex">
  <div class="flex-fill" i18n="@@i18n.encryption.rsaSettings">RSA settings</div>
  <div>
    <button (click)="downloadPrivateKey()" class="btn btn-plain cursor-pointer p-0 pt-1 text-primary" i18n-ngbngbTooltip="@@i18n.encryption.downloadPrivateKey" ngbTooltip="download private key">
      <i>download</i>
    </button>
  </div>
</div>

@if (global.encryptionsValid) {
  <div class="p-3">
    <!-- <div class="card card-info" i18n="@@i18n.encryption.warningNoSave">important: your private keys are NOT saved to the database. Make sure you store them to your disk to import them later</div> -->
    <div>
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" role="switch" id="saveKeysAsCookies" [ngModel]="_user.savesEncryptionCookie" (ngModelChange)="_user.toggleEncryptionCookie()">
        <label class="form-check-label" for="saveKeysAsCookies" i18n="@@i18n.encryption.saveAsCookies">save keys to local browser storage</label>
      </div>
    </div>
  </div>
}

@if (!global.encryptionsValid) {
  <div class="p-3">
    <div class="alert alert-warning" i18n="@@i18n.encryption.warningInvalidKeypair">Unable to decrypt your plugin links. Probably you are using a wrong RSA keypair. Either remove this keypair and import the correct PEM or recreate your plugin links.</div>
    <div>
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" role="switch" id="saveKeysAsCookies" [ngModel]="_user.savesEncryptionCookie" (ngModelChange)="_user.toggleEncryptionCookie()">
        <label class="form-check-label" for="saveKeysAsCookies" i18n="@@i18n.encryption.saveAsCookies">save keys to local browser storage</label>
      </div>
    </div>
  </div>
}
