<div class="mb-3">
    <div class="d-flex justify-content-between align-items-center mb-2">
        @if (label) {
            <label for="i18n-textarea-input" class="form-label mb-0">{{ label }}</label>
        }
        @if (!isLocalized) {
            <button
                type="button"
                class="btn btn-sm btn-outline-primary"
                (click)="localize()"
            >
                <i style="font-size: 1rem; vertical-align: middle;">translate</i>
                <span i18n="@@i18n.common.localize">localize</span>
            </button>
        }
        @if (isLocalized) {
            <select
                class="form-select form-select-sm w-auto"
                [ngModel]="selectedLocaleKey"
                (ngModelChange)="onLocaleChange($event)"
            >
                @for (variant of availableLocales; track variant.language + variant.formality) {
                    <option [value]="variant.language + '-' + variant.formality">
                        {{ variant.label }}
                    </option>
                }
                <option value="remove" i18n="@@i18n.common.removeLocalization">remove localization</option>
            </select>
        }
    </div>
    <textarea
        id="i18n-textarea-input"
        class="form-control"
        [(ngModel)]="textValue"
        [placeholder]="placeholder"
        [rows]="rows"
    ></textarea>
    @if (showPlaceholderInfo) {
        <small class="text-muted">
            <span>
                <span i18n="@@i18n.common.availablePlaceholders">available placeholders</span>
                <span class="notranslate">:</span>
            </span>
            <code>[family_name]</code>, <code>[first_name]</code>, <code>[salutation]</code>
        </small>
    }
</div>
