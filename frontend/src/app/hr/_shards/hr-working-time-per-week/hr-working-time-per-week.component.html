
@if (global.user) {
  <div class="card">
      <div class="card-header" i18n="@@i18n.hr.workingTimesPerDay">working hours per day</div>
      <div class="card-body">
          <ul class="list-group">
              <li class="list-group-item d-flex">
                  <span class="flex-fill" i18n="@@i18n.common.monday">monday</span>
                  <span class="badge">{{global.user.getHpwArray()[0]}}</span>
              </li>
              <li class="list-group-item d-flex">
                  <span class="flex-fill" i18n="@@i18n.common.tuesday">tuesday</span>
                  <span class="badge">{{global.user.getHpwArray()[1]}}</span>
              </li>
              <li class="list-group-item d-flex">
                  <span class="flex-fill" i18n="@@i18n.common.wednesday">wednesday</span>
                  <span class="badge">{{global.user.getHpwArray()[2]}}</span>
              </li>
              <li class="list-group-item d-flex">
                  <span class="flex-fill" i18n="@@i18n.common.thursday">thursday</span>
                  <span class="badge">{{global.user.getHpwArray()[3]}}</span>
              </li>
              <li class="list-group-item d-flex">
                  <span class="flex-fill" i18n="@@i18n.common.friday">friday</span>
                  <span class="badge">{{global.user.getHpwArray()[4]}}</span>
              </li>
          </ul>
      </div>
  </div>
}
