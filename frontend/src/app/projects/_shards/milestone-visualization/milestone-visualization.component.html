<div class="milestone d-block" [nx]="milestone">
	<div class="d-flex">
		<div class="due bg-{{milestone.colorCss}}">{{milestone.due_at}}</div>
		<div>{{milestone.name}} {{milestone.colorCss}} {{milestone.state}}</div>
	</div>
	<div class="connector in"></div>
	<div class="connector out"></div>
</div>
