<div class="container-fluid mt-4">
  <div class="row">
    <!-- Filters Column -->
    <div class="col-3">
      <div class="card">
        <div class="card-header" i18n="@@i18n.common.filters">filters</div>
        <div class="card-body">
          <div class="mb-3">
            <div class="form-label" i18n="@@i18n.common.dateRange">date range</div>
            <input
              type="text"
              ngxDaterangepickerMd
              class="form-control"
              [(ngModel)]="dateRange"
              [ranges]="ranges"
              [showCustomRangeLabel]="true"
              [alwaysShowCalendars]="true"
              [linkedCalendars]="true"
              [locale]="{applyLabel: 'OK', format: 'DD.MM.YYYY'}"
              (ngModelChange)="onDateRangeChange()"
              />
            </div>
          </div>
        </div>
      </div>

      <!-- Main Content Column -->
      <div class="col-9">
        @if (loading) {
          <div class="card">
            <div class="card-body text-center">
              <div class="spinner-border" role="status">
                <span class="visually-hidden" i18n="@@i18n.common.loading">loading</span>
              </div>
            </div>
          </div>
        }

        @if (!loading) {
          <div>
            <!-- Projects Created -->
            <div class="card mb-3">
              <div class="card-header" i18n="@@i18n.projects.projects-reporting.projectsCreated">projects created</div>
              <ul class="list-group list-group-flush">
                <li class="list-group-item" *nxFor="let project of reportData">
                  <div class="d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-2">
                      <avatar [object]="project.company"></avatar>
                      <span>{{ project.name }}</span>
                    </div>
                    <div class="d-flex align-items-center gap-1 flex-row-reverse">
                      @for (state of project.states; track state.id; let i = $index; let last = $last) {
                        <i
                          [style.color]="state.color"
                          [style.opacity]="isStateInRange(state.pivot.created_at) ? '1' : '0.3'"
                          [style.font-size]="isStateInRange(state.pivot.created_at) ? '24px' : '18px'"
                          [style.cursor]="'default'"
                          [ngbTooltip]="state.name + ' - ' + formatDate(state.pivot.created_at)">
                          {{ state.getStateIcon() }}
                        </i>
                        @if (!last) {
                          <i class="text-muted" style="font-size: 16px; cursor: default;">arrow_forward</i>
                        }
                      }
                    </div>
                  </div>
                </li>
                @if (reportData.length === 0) {
                  <li class="list-group-item p-0">
                    <empty-state [card]="false" class="projects" i18n-title="@@i18n.projects.reportingEmpty" title="no projects in this period"></empty-state>
                  </li>
                }
              </ul>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
