<div class="modal d-block" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">{{headerTitle}}</span>
      </div>
      <div class="modal-body">
        <div class="input-group mb-3">
          <span class="input-group-text" i18n="@@i18n.common.description">description</span>
          <input #title type="text" class="form-control">
        </div>
        @if (basePrice > 0) {
          <div class="input-group mb-3">
            <span class="input-group-text text-white">
                <span class="notranslate">📊 </span>
                <span i18n="@@i18n.common.base">base</span>
            </span>
            <input #basePriceField type="number" class="form-control" [(ngModel)]="basePrice">
            <span class="input-group-text">{{this.global.currencySymbol()}}</span>
            <button type="button" class="btn btn-outline-info btn-sm ms-2" (click)="calculatePercentage(5)">5%</button>
            <button type="button" class="btn btn-outline-info btn-sm" (click)="calculatePercentage(10)">10%</button>
            <button type="button" class="btn btn-outline-info btn-sm" (click)="calculatePercentage(15)">15%</button>
            <button type="button" class="btn btn-outline-info btn-sm" (click)="calculatePercentage(20)">20%</button>
            <button type="button" class="btn btn-outline-info btn-sm" (click)="calculatePercentage(25)">25%</button>
            <button type="button" class="btn btn-outline-info btn-sm" (click)="calculatePercentage(30)">30%</button>
          </div>
        }
        <div class="input-group mb-3">
          <span class="input-group-text" i18n="@@i18n.common.value">value</span>
          <input #value type="text" class="form-control">
          <span class="input-group-text">{{this.global.currencySymbol()}}</span>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" (click)="decline()" data-bs-dismiss="modal" i18n="@@i18n.common.cancel">cancel</button>
        <button type="button" class="btn btn-primary" (click)="accept()" hotkey="CTRL+ENTER" i18n="@@i18n.common.ok">ok</button>
      </div>
    </div>
  </div>
</div>
