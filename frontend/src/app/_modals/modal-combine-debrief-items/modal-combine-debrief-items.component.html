<div class="modal d-block" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" i18n="@@i18n.debrief.combineItems">combine items</span>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <span class="form-label" i18n="@@i18n.debrief.selectCanonicalTitle">select canonical title</span>
                    <div class="list-group">
                        @for (item of items; track item.id) {
                            <button type="button"
                                class="list-group-item list-group-item-action"
                                [class.active]="!useCustom && selectedTitle === item.title"
                                (click)="selectTitle(item.title)">
                                {{ item.title }}
                            </button>
                        }
                        <button type="button"
                            class="list-group-item list-group-item-action"
                            [class.active]="useCustom"
                            (click)="enableCustom()">
                            <em i18n="@@i18n.common.enterCustomTitle">enter custom title...</em>
                        </button>
                    </div>
                </div>
                @if (useCustom) {
                    <div class="mb-3">
                        <input #customInput type="text" class="form-control" [(ngModel)]="customTitle"
                            placeholder="custom title" i18n-placeholder="@@i18n.debrief.customTitle">
                    </div>
                }
            </div>
            <div class="modal-footer">
                <button type="button" class="btn" (click)="decline()" i18n="@@i18n.common.cancel">cancel</button>
                <button type="button" class="btn btn-primary" (click)="accept()" hotkey="CTRL+ENTER"
                    [disabled]="!finalTitle.trim()" i18n="@@i18n.debrief.combineItems">combine</button>
            </div>
        </div>
    </div>
</div>
