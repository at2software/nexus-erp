<div class="modal d-block" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title" i18n="@@i18n.marketing.addToInitiative">add to initiative</span>
      </div>
      <div class="modal-body">
        @if (isLoading) {
          <div class="text-center py-3">
            <div class="spinner-border spinner-border-sm" role="status">
              <span class="visually-hidden" i18n="@@i18n.common.loading">loading</span>
            </div>
          </div>
        }
        @if (!isLoading) {
          <div class="mb-3">
            <div class="form-label" i18n="@@i18n.marketing.selectInitiative">select initiative</div>
            <select class="form-select" [(ngModel)]="selectedInitiativeId">
              <option value="" i18n="@@i18n.common.pleaseSelect">please select...</option>
              @for (initiative of initiatives; track initiative.id) {
                <option [value]="initiative.id">{{initiative.name}}</option>
              }
            </select>
            @if (initiatives.length === 0) {
              <div class="form-text text-muted" i18n="@@i18n.marketing.noActiveInitiatives">no active initiatives available</div>
            }
          </div>
          <div>
            <div class="form-label" i18n="@@i18n.common.contacts">contacts</div>
            @if (contacts.length === 0) {
              <div class="text-muted small" i18n="@@i18n.marketing.noContacts">no contacts available</div>
            }
            @if (contacts.length > 0) {
              <scrollbar style="max-height: 300px;">
                <div class="list-group">
                  @for (contact of contacts; track contact.id) {
                    <button type="button"
                      class="list-group-item list-group-item-action d-flex align-items-center gap-2 py-2"
                      [class.active]="selectedContactIds.has(contact.id)"
                      (click)="toggleContact(contact.id)">
                      <avatar [object]="contact" size="32"></avatar>
                      <span class="flex-fill text-truncate">{{contact.name}}</span>
                      @if (selectedContactIds.has(contact.id)) {
                        <i class="text-primary">check</i>
                      }
                    </button>
                  }
                </div>
              </scrollbar>
            }
          </div>
        }
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" (click)="decline()" i18n="@@i18n.common.cancel">cancel</button>
        <button type="button" class="btn btn-primary" (click)="accept()" [disabled]="!isValid" i18n="@@i18n.common.add">add</button>
      </div>
    </div>
  </div>
</div>
