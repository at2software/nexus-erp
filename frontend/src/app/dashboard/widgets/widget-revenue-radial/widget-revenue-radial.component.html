<div class="card mb-3">
  <div class="card-header">
    <n>invoices</n>
    <span class="flex-fill text-truncate" i18n="@@i18n.widget-revenue-monthlyRange">monthly revenue range</span>
  </div>
  <div class="card-body d-flex justify-content-center align-items-center" style="min-height: 300px;">
    @if (loading) {
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">
            <span i18n="@@i18n.common.loading">loading</span>
            <span class="notranslate">...</span>
        </span>
      </div>
    } @else {
      <div #chart></div>
    }
  </div>
</div>
