<div class="card card-chart mb-3" [class.d-none-container]="data.length===0">

    <div class="card-header gap-2">
        <n>project</n>
        <span class="flex-fill text-truncate" i18n="@@i18n.project.missingProjectManager">missing project manager</span>
        <span class="badge badge-dark">{{value ? value : (value | loading)}}</span>
    </div>

    <widget-options [options]="getOptions()" (updated)="_onUpdate($event)" (deleted)="onDelete($event)"></widget-options>

    @if (data.length > 0) {
    <ul class="list-group list-group-flush">
        @for (_ of data; track _.id) {
        <li class="list-group-item d-flex text-nowrap" [nx]="_" [tables]="data" [class.compact]="indexExceedsSettings(i)">
            <div>
                <avatar [object]="_"></avatar>
            </div>
            <div class="flex-fill ms-3 text-truncate">
                <div class="d-flex text-truncate">
                    <div class="flex-fill text-truncate">{{_.name}}</div>
                    <div class="text-muted" roles="invoicing">{{_.net_remaining | mshort}}</div>
                </div>
                <progress-bar [class.d-none]="!_.state.isRunning()" [style]="_.colorCss" [progress]="_.progress"></progress-bar>
            </div>
        </li>
        }
    </ul>
    }
</div>
