<div class="card card-chart mb-3">

  <div class="card-header gap-2">
    <n>project</n>
    <span class="flex-fill text-truncate" i18n="@@i18n.common.projects">projects</span>
    <div class="chart-title" roles="invoicing">{{value ? (value | mshort) : (value | loading)}}</div>
  </div>

  @if (hasInvoicesModule) {
    <chart-card-range type="rangeArea" [chartData]="chartData" [suffix]="' ' + global.currencySymbol()" color="blue"></chart-card-range>
  }

  <widget-options [options]="getOptions()" (updated)="_onUpdate($event)" (deleted)="onDelete($event)"></widget-options>

  @if (!getOptions()['chart-only']?.value) {
    <ul-compact [badge]="this.badgeCount(data) > 0 ? '' + this.badgeCount(data) : undefined">
      @for (_ of data; track _.id) {
      <li class="list-group-item d-flex text-nowrap {{_.markerClass()}}" [class.compact]="indexExceedsSettings(i()!) && !_.badge" [nx]="_" [tables]="data">
        <div>
          <avatar [object]="_"></avatar>
        </div>
        <div class="flex-fill ms-3 text-truncate">
          <div class="d-flex text-truncate">
            <div class="flex-fill text-truncate">{{_.name}}</div>
            <div class="text-muted" roles="invoicing" ngbTooltip="{{(_.foci_sum ?? 0) / _.hours_invested | percent}} of time is without focus item">{{_.net_remaining | mshort}}</div>
          </div>
          <progress-bar [style]="'blue'" [progress]="_.progress" ngbTooltip="{{_.progress | percent }}"></progress-bar>
        </div>
      </li>

      }
    </ul-compact>
  }
</div>
