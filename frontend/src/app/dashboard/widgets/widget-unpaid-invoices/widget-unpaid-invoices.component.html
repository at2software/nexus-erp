<div class="card card-chart mb-3">

  <div class="card-header gap-2">
    <n>invoice</n>
    <span class="flex-fill text-truncate" i18n="@@i18n.invoice.unpaid">unpaid</span>
    <span class="badge badge-dark" i18n="@@i18n.common.gross">gross</span>
    @if (value) {
      <div class="chart-title text-nowrap">{{(value ? value : 0) | mshort}}</div>
    }
  </div>

  <chart-card-range type="rangeArea" [chartData]="chartData" [suffix]="' ' + global.currencySymbol()" color="teal" roles="invoicing"></chart-card-range>

  <widget-options [options]="getOptions()" (updated)="_onUpdate($event)" (deleted)="onDelete($event)"></widget-options>
  @if (data && !getOptions()['chart-only']?.value) {
    <ul-compact [badge]="this.badgeCount(data) > 0 ? '' + this.badgeCount(data) : undefined">
      @for (_ of data; track _.id; let i = $index) {
        <li
          class="list-group-item d-flex text-nowrap {{_.markerClass()}}"
          [class.compact]="_.badge ? false : indexExceedsSettings(i)"
          [nx]="_"
          ngbTooltip="Next reminder at {{_.remind_at | date}}"
          >
          <div>
            <avatar [object]="_"></avatar>
          </div>
          <div class="flex-fill ms-3 text-truncate">
            <div class="d-flex text-truncate">
              <div class="flex-fill text-truncate">{{_.name}}</div>
              <div [class.text-muted]="!_.needs_reminder" [class.text-danger]="_.needs_reminder">{{_.gross_remaining | mshort}}</div>
            </div>
            <progress-bar [progress]="_.progress" [style]="_.colorCss" [overStyle]="_.getOverdueColor()" [title]="_.due_at | date:'shortDate'"></progress-bar>
          </div>
        </li>
      }
    </ul-compact>
  }
</div>
